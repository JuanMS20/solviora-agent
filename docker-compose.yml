#
# docker-compose.yml for Solviora Agent
#
# Usage:
#   SOLVIORA_UID=$(id -u) SOLVIORA_GID=$(id -g) docker compose up -d
#
# Legacy env vars (HERMES_UID / HERMES_GID) are still supported as
# fallback for existing deployments.
#
# Set SOLVIORA_UID / SOLVIORA_GID to the host user that owns ~/.solviora
# (or ~/.hermes for legacy configs) so files created inside the container
# stay readable/writable on the host.
# The entrypoint remaps the internal `solviora` user to these values via
# usermod/groupmod + gosu.
#
# Security notes:
#   - The dashboard service binds to 127.0.0.1 by default. It stores API
#     keys; exposing it on LAN without auth is unsafe. If you want remote
#     access, use an SSH tunnel or put it behind a reverse proxy that
#     adds authentication — do NOT pass --insecure --host 0.0.0.0.
#   - The gateway's API server is off unless you uncomment API_SERVER_KEY
#     and API_SERVER_HOST. See docs/user-guide/api-server.md before doing
#     this on an internet-facing host.
#
services:
  gateway:
    build: .
    image: solviora-agent
    container_name: solviora
    restart: unless-stopped
    network_mode: host
    volumes:
      - ~/.solviora:/opt/data
    environment:
      - SOLVIORA_UID=${SOLVIORA_UID:-${HERMES_UID:-10000}}
      - SOLVIORA_GID=${SOLVIORA_GID:-${HERMES_GID:-10000}}
      # Backward compat: set legacy HERMES_* so the old entrypoint path works
      - HERMES_UID=${SOLVIORA_UID:-${HERMES_UID:-10000}}
      - HERMES_GID=${SOLVIORA_GID:-${HERMES_GID:-10000}}
      # To expose the OpenAI-compatible API server beyond localhost,
      # uncomment BOTH lines (API_SERVER_KEY is mandatory for auth):
      # - API_SERVER_HOST=0.0.0.0
      # - API_SERVER_KEY=${API_SERVER_KEY}
      # Microsoft Teams — uncomment and fill in to enable Teams gateway.
      # Register your bot at https://dev.botframework.com/ to get these values.
      # - TEAMS_CLIENT_ID=${TEAMS_CLIENT_ID}
      # - TEAMS_CLIENT_SECRET=${TEAMS_CLIENT_SECRET}
      # - TEAMS_TENANT_ID=${TEAMS_TENANT_ID}
      # - TEAMS_ALLOWED_USERS=${TEAMS_ALLOWED_USERS}
      # - TEAMS_PORT=${TEAMS_PORT:-3978}
    command: ["gateway", "run"]

  dashboard:
    image: solviora-agent
    container_name: solviora-dashboard
    restart: unless-stopped
    network_mode: host
    depends_on:
      - gateway
    volumes:
      - ~/.solviora:/opt/data
    environment:
      - SOLVIORA_UID=${SOLVIORA_UID:-${HERMES_UID:-10000}}
      - SOLVIORA_GID=${SOLVIORA_GID:-${HERMES_GID:-10000}}
      - HERMES_UID=${SOLVIORA_UID:-${HERMES_UID:-10000}}
      - HERMES_GID=${SOLVIORA_GID:-${HERMES_GID:-10000}}
    # Localhost-only. For remote access, tunnel via `ssh -L 9119:localhost:9119`.
    command: ["dashboard", "--host", "127.0.0.1", "--no-open"]
